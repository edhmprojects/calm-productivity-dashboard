<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calm Productivity Dashboard</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="dashboard">
      <div class="panel" id="timer">
        <h2>Timer</h2>
        <p>Timer display placeholder</p>
        <p>Timer controls placeholder</p>
      </div>

      <div class="panel" id="quote">
        <h2>Quote</h2>
        <p>Quote generator placeholder</p>
      </div>

      <div class="panel" id="todo">
        <h2>To‑Do List</h2>

        <div class="todo-input">
          <input type="text" id="todoInput" placeholder="Add a task..." />
          <button id="addTodo">Add</button>
        </div>

        <ul id="todoList"></ul>
      </div>
    </main>
  </body>
</html>
